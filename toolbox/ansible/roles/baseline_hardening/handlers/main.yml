---
# reload (SIGHUP), not restart: a config reload re-reads sshd_config without
# dropping existing SSH sessions — safer when you're hardening over SSH.
- name: reload sshd
  ansible.builtin.service:
    name: "{{ sshd_service | default('ssh') }}"
    state: reloaded

- name: reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: false
